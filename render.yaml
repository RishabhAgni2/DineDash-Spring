services:
  - type: web
    runtime: docker
    name: food-fiesta
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: JAVA_TOOL_OPTIONS
        value: -XX:MaxRAMPercentage=75.0
      - key: DATABASE_URL
        fromDatabase:
          name: food-fiesta-db
          property: connectionString
      - key: DB_NAME
        fromDatabase:
          name: food-fiesta-db
          property: database
      - key: DB_USER
        fromDatabase:
          name: food-fiesta-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: food-fiesta-db
          property: password

databases:
  - name: food-fiesta-db
    plan: free
    databaseName: foodfiesta
